version: '3'

services:

  web:
    image: nginx
    container_name: webserver

    ports:
      - "5000:80"

    volumes:
      - ./app:/usr/share/nginx/html

    restart: always

  database:
    image: mysql:8

    container_name: mysql-db

    environment:
        MYSQL_ROOT_PASSWORD: root

        MYSQL_DATABASE: testdb

    ports:

      - "3306:3306"

    volumes:

      - db_data:/var/lib/mysql

    restart: always

volumes:

  db_data:
